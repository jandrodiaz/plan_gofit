<title>Plan Entreno Jandro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f12; --bg2: #17171c; --bg3: #1f1f26;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0eff5; --muted: #8a8898; --muted2: #5a5968;
    --bike: #1dddaa; --bike-bg: rgba(29,221,170,0.1);
    --gym: #a78bfa; --gym-bg: rgba(167,139,250,0.1);
    --rest: #f59e0b; --rest-bg: rgba(245,158,11,0.08);
    --accent: #1dddaa; --r: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  html { height: 100%; height: -webkit-fill-available; }
  body { min-height: 100vh; min-height: -webkit-fill-available; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
  #app { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }

  .header { padding: calc(var(--safe-top) + 18px) 20px 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
  .week-counter { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: var(--bike-bg); padding: 4px 10px; border-radius: 20px; }
  .week-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .week-scroll::-webkit-scrollbar { display: none; }
  .week-btn { flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: all .2s; position: relative; }
  .week-btn .wnum { font-size: 14px; font-weight: 500; line-height: 1; }
  .week-btn .wlabel { font-size: 9px; letter-spacing: .04em; }
  .week-btn.active { background: var(--accent); border-color: var(--accent); color: #0f2e26; }
  .week-btn.descarga.active { background: var(--rest); border-color: var(--rest); color: #2a1a00; }
  .week-btn .dot { position: absolute; top: 5px; right: 5px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity .2s; }
  .week-btn.done .dot { opacity: 1; }

  .progress-wrap { padding: 12px 20px 0; flex-shrink: 0; }
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; }

  .content { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--safe-bot) + 16px); scrollbar-width: none; }
  .content::-webkit-scrollbar { display: none; }

  .fase-tag { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .08em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px; }
  .fase-base { background: var(--bike-bg); color: var(--bike); }
  .fase-descarga { background: var(--rest-bg); color: var(--rest); }
  .fase-progresion { background: var(--gym-bg); color: var(--gym); }
  .fase-eval { background: rgba(255,255,255,0.05); color: var(--muted); }

  .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; transition: border-color .2s; }
  .day-card.expanded { border-color: var(--border2); }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .day-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .icon-bike { background: var(--bike-bg); } .icon-gym { background: var(--gym-bg); } .icon-rest { background: var(--rest-bg); }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .day-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .day-arrow { width: 20px; height: 20px; color: var(--muted2); flex-shrink: 0; transition: transform .25s; }
  .day-card.expanded .day-arrow { transform: rotate(180deg); }
  .day-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
  .day-body-inner { padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .section-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted2); padding: 10px 0 4px; font-weight: 500; }

  .ejercicio { border-bottom: 1px solid var(--border); }
  .ejercicio:last-of-type { border-bottom: none; }
  .ej-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 6px; gap: 8px; }
  .ej-left { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; }
  .ej-name { font-size: 13px; line-height: 1.3; }
  .ej-info-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; color: var(--muted2); font-size: 10px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; -webkit-tap-highlight-color: transparent; line-height: 1; }
  .ej-info-btn.open { background: var(--accent); border-color: var(--accent); color: #0f2e26; }
  .ej-series { font-size: 12px; font-weight: 500; text-align: right; white-space: nowrap; flex-shrink: 0; }
  .c-bike { color: var(--bike); } .c-gym { color: var(--gym); } .c-rest { color: var(--rest); }
  .ej-desc { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .ej-desc-inner { padding: 2px 0 10px; font-size: 12px; color: var(--muted); line-height: 1.65; border-left: 2px solid var(--border2); margin-left: 9px; padding-left: 12px; }
  .ej-desc-inner strong { color: var(--text); font-weight: 500; display: block; margin-top: 4px; }

  .nota { margin-top: 10px; padding: 10px 12px; background: var(--bg3); border-radius: 8px; font-size: 12px; color: var(--muted); line-height: 1.5; border-left: 2px solid var(--border2); }
  .done-wrap { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .done-label { font-size: 12px; color: var(--muted2); font-family: 'DM Mono', monospace; }
  .done-btn { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 14px; color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
  .done-btn:active { transform: scale(.96); }
  .done-btn.ck-bike { background: var(--bike-bg); border-color: var(--bike); color: var(--bike); }
  .done-btn.ck-gym { background: var(--gym-bg); border-color: var(--gym); color: var(--gym); }
  .done-btn.ck-rest { background: var(--rest-bg); border-color: var(--rest); color: var(--rest); }

  .week-complete { text-align: center; padding: 40px 16px; display: none; }
  .week-complete.show { display: block; }
  .complete-icon { font-size: 52px; margin-bottom: 14px; }
  .complete-title { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
  .complete-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .day-card { animation: fadeUp .3s ease both; }
  .day-card:nth-child(2) { animation-delay: .06s; }
  .day-card:nth-child(3) { animation-delay: .12s; }
</style>
</head>

    <div class="header-top">
      <span class="app-title">Plan · 8 semanas</span>

    </div>
    <div class="week-scroll" id="week-scroll"></div>

      <span id="prog-pct">12.5%</span>

  </div>
  <div class="content" id="content"></div>
</div>

function getDesc(n) {
  if (DESC[n]) return DESC[n];
  const base = n.replace(/—.*$/, '').trim();
  if (DESC[base]) return DESC[base];
  for (const k of Object.keys(DESC)) {
    if (base.length > 5 && base.toLowerCase().startsWith(k.toLowerCase().substring(0, Math.min(k.length, 12)))) return DESC[k];
  }
  return null;
}

const ICONOS={bike:'🚴',gym:'💪',rest:'🛌'};
const FASE_CLS={base:'fase-base',descarga:'fase-descarga',progresion:'fase-progresion',eval:'fase-eval'};
const FASE_LBL={base:'Fase 1 — Base',descarga:'Semana de descarga',progresion:'Fase 2 — Progresión',eval:'Evaluación final'};
const SERIES_CLS={bike:'c-bike',gym:'c-gym',rest:'c-rest'};
const DONE_CLS={bike:'ck-bike',gym:'ck-gym',rest:'ck-rest'};

let done=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
function saveDone(){localStorage.setItem(STORAGE_KEY,JSON.stringify(done));}

function buildWeekBtns(){
  const el=document.getElementById('week-scroll');
  plan.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='week-btn'+(s.fase==='descarga'?' descarga':'')+(i===0?' active':'');
    b.innerHTML=`<span class="wnum">${i+1}</span><span class="wlabel">${s.label}</span><span class="dot"></span>`;
    b.onclick=()=>selectSem(i);
    el.appendChild(b);
  });
  updateDots();
}

function updateDots(){
  document.querySelectorAll('.week-btn').forEach((b,i)=>{
    b.classList.toggle('done',plan[i].dias.every((_,di)=>done[`${i}-${di}`]));
  });
}

function selectSem(idx){
  document.querySelectorAll('.week-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const pct=((idx+1)/8*100).toFixed(1);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('week-counter').textContent=`Sem ${idx+1} / 8`;
  renderContent(idx);
  document.querySelectorAll('.week-btn')[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

let dc=0;
function renderEjs(items,tipo){
  return items.map(e=>{
    const desc=getDesc(e.n);
    const id='d'+(dc++);
    const btn=desc?`<button class="ej-info-btn" onclick="toggleDesc('${id}',event)">i</button>`:'';
    const block=desc?`<div class="ej-desc" id="${id}" style="max-height:0"><div class="ej-desc-inner">${desc}</div></div>`:'';
    return `<div class="ejercicio"><div class="ej-row"><div class="ej-left">${btn}<span class="ej-name">${e.n}</span></div><span class="ej-series ${SERIES_CLS[tipo]}">${e.s}</span></div>${block}</div>`;
  }).join('');
}

function toggleDesc(id,e){
  e.stopPropagation();
  const el=document.getElementById(id);
  if(!el)return;
  const btn=e.currentTarget;
  const isOpen=el.style.maxHeight&&el.style.maxHeight!=='0px';
  if(isOpen){el.style.maxHeight='0';btn.classList.remove('open');}
  else{
    el.style.maxHeight=el.scrollHeight+100+'px';btn.classList.add('open');
    setTimeout(()=>{const db=el.closest('.day-body');if(db&&db.style.maxHeight)db.style.maxHeight=parseInt(db.style.maxHeight)+300+'px';},50);
  }
}

function renderContent(idx){
  dc=0;
  const s=plan[idx];
  const el=document.getElementById('content');
  const allDone=s.dias.every((_,di)=>done[`${idx}-${di}`]);
  let html=`<span class="fase-tag ${FASE_CLS[s.fase]}">${FASE_LBL[s.fase]}</span>`;
  s.dias.forEach((d,di)=>{
    const isDone=!!done[`${idx}-${di}`];
    let body='';
    if(d.secciones){d.secciones.forEach(sec=>{if(sec.label)body+=`<div class="section-label">${sec.label}</div>`;body+=renderEjs(sec.items,d.tipo);});}
    html+=`<div class="day-card" id="card-${di}">
      <div class="day-header" onclick="toggleCard(${di})">
        <div class="day-icon icon-${d.tipo}">${ICONOS[d.tipo]}</div>
        <div class="day-info"><div class="day-title">${d.titulo}</div><div class="day-sub">${d.dia} · ${d.sub}</div></div>
        <svg class="day-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="day-body" id="body-${di}">
        <div class="day-body-inner">
          ${body}
          ${d.nota?`<div class="nota">${d.nota}</div>`:''}
          <div class="done-wrap">
            <span class="done-label">${isDone?'✓ completado':'marcar como hecho'}</span>
            <button class="done-btn ${isDone?DONE_CLS[d.tipo]:''}" onclick="toggleDone(${idx},${di},event)">${isDone?'✓ Hecho':'Marcar'}</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  if(allDone)html+=`<div class="week-complete show"><div class="complete-icon">🏆</div><div class="complete-title">¡Semana completada!</div><div class="complete-sub">Bien hecho. Pasa a la semana ${idx+2<=8?idx+2:'siguiente'} cuando estés listo.</div></div>`;
  el.innerHTML=html;el.scrollTop=0;
}

function toggleCard(di){
  const card=document.getElementById(`card-${di}`);
  const body=document.getElementById(`body-${di}`);
  const exp=card.classList.toggle('expanded');
  body.style.maxHeight=exp?body.scrollHeight+500+'px':'0';
}

function toggleDone(semIdx,di,e){
  e.stopPropagation();
  const key=`${semIdx}-${di}`;
  done[key]=!done[key];
  saveDone();updateDots();renderContent(semIdx);
  const card=document.getElementById(`card-${di}`);
  const body=document.getElementById(`body-${di}`);
  card.classList.add('expanded');
  body.style.maxHeight=body.scrollHeight+500+'px';
}

buildWeekBtns();
selectSem(0);
</script>
